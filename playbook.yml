---
- name: Gazeto Client installer for RPi
  hosts:
    - localhost

  tasks:
    - name: Update package list
      ansible.builtin.apt:
        update_cache: yes
      become: "yes"

    - name: Update all installed packages
      ansible.builtin.apt:
        upgrade: "safe"
      become: "yes"

    - name: Install packages
      ansible.builtin.apt:
        name:
          - nginx
          - fbi
          - php8.2-bcmath
          - php8.2-cli
          - php8.2-common
          - php8.2-curl
          - php8.2-gmp
          - php8.2-intl
          - php8.2-mbstring
          - php8.2-opcache
          - php8.2-sqlite3
          - php8.2-xml
          - php8.2-xsl
          - php8.2-zip
          - composer
          - unzip
          - zip
          - htop
          - ansible
          - git
        state: present
      become: "yes"

    - name: Copy theme
      ansible.builtin.copy:
        src: gazeto-plymouth-theme/
        dest: /usr/share/plymouth/themes/gazeto-plymouth-theme
        force: "true"
        owner: root
        group: root
        mode: "u=rw,g=r,o=r"
        directory_mode: "u=rwx,g=rx,o=rx"
      become: "yes"

    - name: Activate theme
      ansible.builtin.lineinfile:
        path: /etc/plymouth/plymouthd.conf
        regexp: '^Theme='
        line: 'Theme=gazeto-plymouth-theme'
      become: "yes"

    - name: Copy splashscreen service file
      ansible.builtin.copy:
        src: splashscreen.service
        dest: /etc/systemd/system/splashscreen.service
        force: "true"
        owner: root
        group: root
        mode: "u=rw,g=r,o=r"
      become: "yes"

    - name: Activate splashscreen service
      ansible.builtin.systemd_service:
        name: "splashscreen.service"
        daemon_reload: true
        enabled: "true"
      become: "yes"
